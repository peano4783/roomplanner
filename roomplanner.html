<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">

<head>
    <meta charset="utf-8">
    <title>Room Planner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <style>  div {  padding-bottom: 1px;   }
             table, th, td {  border:1px solid black; border-collapse: collapse; }
             table { table-layout: fixed; width:100%; }
    </style>
</head>

<body>
    <form method="post">
    <div class="container">
      <div class="row">
        <label class="col-sm-6"><h2>Room Planner</h2></label>
      </div>

      <div class="row">
        <label class="col-sm-2">Input data:</label>
        <div class="col-sm-10">
            <textarea id="input_data" rows="5" class="form-control"></textarea>
        </div>
      </div>
      <div class="row">
        <label class="col-sm-2">Magnify (%):</label>
        <div class="col-sm-2">
            <input id="magnify" class="form-control" type="number" value="100"/>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-2 offset-sm-8">
          <input class="form-control btn-success" type="submit" name="submit_button" value="Submit">
        </div>
      </div>
    </div>
    </form>
    <script src="roomplanner.js"></script>
    <script>
        loadDefaultInputData("input_data");
    </script>
</body>

</html>
